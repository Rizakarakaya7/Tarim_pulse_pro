name: Daily Data Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write # Botun depona dosya yüklemesi için şart!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4 yaptık (Node uyarıları gider)

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 -> v5 yaptık
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          pip install -r requirements.txt

      - name: Run Pipeline
        run: python src/run_pipeline.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Automated daily data update [skip ci]" || echo "No changes to commit"
          git push